name: Windows CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags: [ "**" ]
    paths-ignore:
      - ".gitignore"
      - "README.md"
      - "docs/**"
      - ".github/workflows/*.yml"
      - "cmake/presets/*.json"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  id-token: write

jobs:
  build-and-test:
    name: Build (Qt${{ matrix.qt_version }}, ${{ matrix.renderer }}, ${{ matrix.arch }}, ${{ matrix.build_type }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - qt_version: 6.8.3
            qt_arch: win64_msvc2022_64
            runner: windows-2025
            arch: msvc2022_64
            compiler: x64
            vsversion: 2022
            preset: Windows-OpenGL-sccache
            renderer: OpenGL
            build_type: Debug
          - qt_version: 6.8.3
            qt_arch: win64_msvc2022_64
            runner: windows-2025
            arch: msvc2022_64
            compiler: x64
            vsversion: 2022
            preset: Windows-OpenGL-sccache
            renderer: OpenGL
            build_type: Release

    env:
      PRESET: ${{ matrix.preset }}
      BUILD_TYPE: ${{ matrix.build_type }}

    steps:
      - name: Configure AWS Credentials
        if: vars.OIDC_AWS_ROLE_TO_ASSUME
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-west-2
          role-to-assume: ${{ vars.OIDC_AWS_ROLE_TO_ASSUME }}
          role-session-name: ${{ github.run_id }}

      - name: Install sccache
        uses: MinoruSekine/setup-scoop@v4
        with:
          buckets: extras
          apps: sccache

      - name: Configure sccache
        shell: bash
        run: |
          sccache --version
          {
            echo "SCCACHE_BUCKET=maplibre-native-sccache"
            echo "SCCACHE_REGION=eu-central-1"
          } >> "$GITHUB_ENV"
          if [ -z "${AWS_SECRET_ACCESS_KEY}" ]; then
            echo "AWS_SECRET_ACCESS_KEY not set; not uploading sccache cache to S3"
            echo "SCCACHE_S3_NO_CREDENTIALS=1" >> "$GITHUB_ENV"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: source
          fetch-depth: 0

      - name: Install Submodules
        shell: bash
        run: |
          cd source
          git config --global core.longpaths true
          git submodule sync --recursive
          git submodule update --init --depth 1 vendor/maplibre-native
          cd vendor/maplibre-native
          git submodule update --init --recursive --depth 1 --force

      - name: Download Qt
        uses: jurplel/install-qt-action@v4
        with:
          aqtversion: ==3.3.*
          aqtsource: git+https://github.com/miurahr/aqtinstall.git
          version: ${{ matrix.qt_version }}
          target: desktop
          arch: ${{ matrix.qt_arch }}
          modules: qtlocation qtpositioning

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: 3.30.x

      - name: Setup ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.compiler }}
          vsversion: ${{ matrix.vsversion }}

      # 🔥 构建：自动使用带 build_type 的目录
      - name: Build
        shell: bash
        working-directory: source
        run: |
          cmake --preset ${PRESET} \
            -DCMAKE_BUILD_TYPE=${BUILD_TYPE} \
            -DCMAKE_CONFIGURATION_TYPES=${BUILD_TYPE}
          cmake --build --preset ${PRESET} --config ${BUILD_TYPE}

      # 🔥 安装：完全保持你原来的写法！只加了版本后缀
      - name: Install
        shell: bash
        run: |
          mkdir -p install && cd install
          tar xf ../build/qt6-Windows-${{ matrix.renderer }}-${{ matrix.build_type }}/maplibre-native-qt_*.tar.bz2
          mv maplibre-native-qt_* maplibre-native-qt-${{ matrix.build_type }}

      # 🔥 示例：DIR 自动对应版本
      - name: Build QtQuick Example
        shell: bash
        working-directory: source/examples/quick
        run: |
          export QMapLibre_DIR="$GITHUB_WORKSPACE/install/maplibre-native-qt-${{ matrix.build_type }}"
          cmake --workflow --preset default

      - name: Build QtQuick Standalone Example
        shell: bash
        working-directory: source/examples/quick-standalone
        run: |
          export QMapLibre_DIR="$GITHUB_WORKSPACE/install/maplibre-native-qt-${{ matrix.build_type }}"
          cmake --workflow --preset default

      - name: Build QtWidgets Example
        shell: bash
        working-directory: source/examples/widgets
        run: |
          export QMapLibre_DIR="$GITHUB_WORKSPACE/install/maplibre-native-qt-${{ matrix.build_type }}"
          cmake --workflow --preset default

      - name: Show sccache stats
        run: sccache --show-stats

      # 🔥 上传：带上 build_type
      - name: Upload installation
        uses: actions/upload-artifact@v7
        with:
          name: Windows_${{ matrix.arch }}_${{ matrix.qt_version }}_${{ matrix.renderer }}_${{ matrix.build_type }}
          path: build/qt6-Windows-${{ matrix.renderer }}-${{ matrix.build_type }}/maplibre-native-qt_*.tar.bz2

      - name: Upload examples
        uses: actions/upload-artifact@v7
        with:
          name: Windows_${{ matrix.arch }}_${{ matrix.qt_version }}_${{ matrix.renderer }}_${{ matrix.build_type }}_examples
          path: build/qt6-example-*/*.tar.bz2
