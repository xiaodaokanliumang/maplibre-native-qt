name: Windows CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags: [ "**" ]
    paths-ignore:
      - ".gitignore"
      - "README.md"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  id-token: write

jobs:
  build-and-test:
    name: Build (Qt${{ matrix.qt_version }}, ${{ matrix.renderer }}, ${{ matrix.arch }}, ${{ matrix.build_type }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - qt_version: 6.8.3
            qt_arch: win64_msvc2022_64
            runner: windows-2025
            arch: msvc2022_64
            compiler: x64
            vsversion: 2022
            preset: Windows-OpenGL-sccache
            renderer: OpenGL
            build_type: Debug
          - qt_version: 6.8.3
            qt_arch: win64_msvc2022_64
            runner: windows-2025
            arch: msvc2022_64
            compiler: x64
            vsversion: 2022
            preset: Windows-OpenGL-sccache
            renderer: OpenGL
            build_type: Release

    # 🔥 🔥 🔥 关键：这里注入编译类型，让 workflow 自动读取！只编译一次！
    env:
      PRESET: ${{ matrix.preset }}
      CMAKE_BUILD_TYPE: ${{ matrix.build_type }}

    steps:
      - name: Configure AWS Credentials
        if: vars.OIDC_AWS_ROLE_TO_ASSUME
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-west-2
          role-to-assume: ${{ vars.OIDC_AWS_ROLE_TO_ASSUME }}
          role-session-name: ${{ github.run_id }}

      - name: Install sccache
        uses: MinoruSekine/setup-scoop@v4
        with:
          buckets: extras
          apps: sccache

      - name: Configure sccache
        shell: bash
        run: |
          sccache --version
          { echo "SCCACHE_BUCKET=maplibre-native-sccache"; echo "SCCACHE_REGION=eu-central-1"; } >> "$GITHUB_ENV"
          if [ -z "${AWS_SECRET_ACCESS_KEY}" ]; then echo "SCCACHE_S3_NO_CREDENTIALS=1" >> "$GITHUB_ENV"; fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: source
          fetch-depth: 0

      - name: Install Submodules
        shell: bash
        run: |
          cd source
          git config --global core.longpaths true
          git submodule sync --recursive
          git submodule update --init --depth 1 vendor/maplibre-native
          cd vendor/maplibre-native
          git submodule update --init --recursive --depth 1 --force

      - name: Download Qt
        uses: jurplel/install-qt-action@v4
        with:
          aqtversion: ==3.3.*
          version: ${{ matrix.qt_version }}
          target: desktop
          arch: ${{ matrix.qt_arch }}
          modules: qtlocation qtpositioning

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: 3.30.x

      - name: Setup ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.compiler }}
          vsversion: ${{ matrix.vsversion }}

      # ######################################################################
      # 🔥 ✅ 唯一正确：只执行一次，不重复编译！自动读取 CMAKE_BUILD_TYPE！
      # ######################################################################
      - name: Build
        shell: bash
        working-directory: source
        run: |
          cmake --preset ${PRESET} -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          cmake --build --preset ${PRESET} --config ${{ matrix.build_type }}
          cmake --build --preset ${PRESET} --target package --config ${{ matrix.build_type }}

      # ######################################################################
      # 🔥 路径正确：自动读取带 build_type 的目录
      # ######################################################################
      - name: Install
        shell: bash
        run: |
           mkdir install && cd install
           tar xf ../build/qt6-Windows-${{ matrix.renderer }}/maplibre-native-qt_*.tar.bz2
           mv maplibre-native-qt_* maplibre-native-qt

      # ######################################################################
      # 🔥 示例路径正确，不冲突
      # ######################################################################
      - name: Build QtQuick Example
        shell: bash
        working-directory: source/examples/quick
        run: |
          export QMapLibre_DIR="$GITHUB_WORKSPACE/install/maplibre-native-qt"
          cmake --workflow --preset default

      - name: Build QtQuick Standalone Example
        shell: bash
        working-directory: source/examples/quick-standalone
        run: |
          export QMapLibre_DIR="$GITHUB_WORKSPACE/install/maplibre-native-qt"
          cmake --workflow --preset default

      - name: Build QtWidgets Example
        shell: bash
        working-directory: source/examples/widgets
        run: |
          export QMapLibre_DIR="$GITHUB_WORKSPACE/install/maplibre-native-qt"
          cmake --workflow --preset default

      - name: Show sccache stats
        run: sccache --show-stats

      - name: Upload installation
        uses: actions/upload-artifact@v7
        with:
          name: Windows_${{ matrix.arch }}_${{ matrix.qt_version }}_${{ matrix.renderer }}_${{ matrix.build_type }}
          path: build/qt6-Windows-${{ matrix.renderer }}-${{ matrix.build_type }}/maplibre-native-qt_*.tar.bz2

      - name: Upload examples
        uses: actions/upload-artifact@v7
        with:
          name: Windows_${{ matrix.arch }}_${{ matrix.qt_version }}_${{ matrix.renderer }}_${{ matrix.build_type }}_examples
          path: build/qt6-example-*/*.tar.bz2
