name: Windows CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "**"
    paths-ignore:
      - ".gitignore"
      - "README.md"
      - "docs/**"
      - ".github/FUNDING.yml"
      - ".github/actions/**"
      - ".github/workflows/Android.yml"
      - ".github/workflows/CI-cache-cleanup.yml"
      - ".github/workflows/docs-test.yml"
      - ".github/workflows/gh-pages-docs.yml"
      - ".github/workflows/iOS.yml"
      - ".github/workflows/Linux.yml"
      - ".github/workflows/macOS.yml"
      - ".github/workflows/source-tarball.yml"
      - ".github/workflows/WASM.yml"
      - "cmake/presets/Android.json"
      - "cmake/presets/iOS.json"
      - "cmake/presets/Linux.json"
      - "cmake/presets/macOS.json"
      - "cmake/presets/WASM.json"

  pull_request:
    branches:
      - main
    paths-ignore:
      - ".gitignore"
      - "README.md"
      - "docs/**"
      - ".github/FUNDING.yml"
      - ".github/actions/**"
      - ".github/workflows/Android.yml"
      - ".github/workflows/CI-cache-cleanup.yml"
      - ".github/workflows/docs-test.yml"
      - ".github/workflows/gh-pages-docs.yml"
      - ".github/workflows/iOS.yml"
      - ".github/workflows/Linux.yml"
      - ".github/workflows/macOS.yml"
      - ".github/workflows/source-tarball.yml"
      - ".github/workflows/WASM.yml"
      - "cmake/presets/Android.json"
      - "cmake/presets/iOS.json"
      - "cmake/presets/Linux.json"
      - "cmake/presets/macOS.json"
      - "cmake/presets/WASM.json"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  id-token: write

jobs:
  build-and-test:
    name: Build (Qt${{ matrix.qt_version }}, ${{ matrix.renderer }}, ${{ matrix.arch }}, ${{ matrix.build_type }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - qt_version: 6.8.3
            qt_arch: win64_msvc2022_64
            runner: windows-2022
            arch: msvc2022_64
            compiler: x64
            vsversion: 2022
            preset: Windows-OpenGL-sccache
            renderer: OpenGL
            build_type: Release
          - qt_version: 6.8.3
            qt_arch: win64_msvc2022_64
            runner: windows-2022
            arch: msvc2022_64
            compiler: x64
            vsversion: 2022
            preset: Windows-OpenGL-sccache
            renderer: OpenGL
            build_type: Debug

    env:
      PRESET: ${{ matrix.preset }}
      BUILD_TYPE: ${{ matrix.build_type }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: source
          fetch-depth: 0

      - name: Install Submodules
        shell: bash
        run: |
          cd source
          git config --global core.longpaths true
          git config --global http.postBuffer 157286400
          git submodule sync --recursive
          git submodule update --init --depth 1 vendor/maplibre-native
          cd vendor/maplibre-native
          git submodule update --init --recursive --depth 1 --force

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          aqtversion: ==3.3.*
          version: ${{ matrix.qt_version }}
          target: desktop
          arch: ${{ matrix.qt_arch }}
          modules: qtlocation qtpositioning

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: 3.30.x

      - name: Setup ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      # 🔥 修复 1：删除错误的 toolset，只留 arch 和 vsversion
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.compiler }}
          vsversion: ${{ matrix.vsversion }}

      # 🔥 修复 2：正确的构建目录 + 正确的 CMake 命令
      - name: Build & Install SDK
        shell: bash
        working-directory: source
        run: |
          cmake --preset ${PRESET} \
            -DCMAKE_BUILD_TYPE=${BUILD_TYPE} \
            -DCMAKE_CONFIGURATION_TYPES=${BUILD_TYPE} \
            -DCMAKE_CXX_COMPILER_LAUNCHER= \
            -DCMAKE_C_COMPILER_LAUNCHER=
          
          cmake --build --preset ${PRESET} --config ${BUILD_TYPE}     
          cmake --install "build/qt6-Windows-${{ matrix.renderer }}" --config ${BUILD_TYPE}

      # 🔥 修复 3：正确安装到独立目录
      - name: Prepare Install Directory
        shell: bash
        run: |
          mkdir -p install/${{ matrix.build_type }}
          cd install/${{ matrix.build_type }}
          tar xf ../../source/build/qt6-Windows-${{ matrix.renderer }}/maplibre-native-qt_*.tar.bz2
          mv maplibre-native-qt_* maplibre-native-qt

      # 🔥 修复 4：示例用正确的默认配置，不使用主项目 PRESET
      - name: Build QtQuick Example
        shell: bash
        working-directory: source/examples/quick
        run: |
          export QMapLibre_DIR="$GITHUB_WORKSPACE/install/${{ matrix.build_type }}/maplibre-native-qt"
          cmake -B build -DCMAKE_BUILD_TYPE=${BUILD_TYPE}
          cmake --build build --config ${BUILD_TYPE}

      - name: Build QtQuick Standalone Example
        shell: bash
        working-directory: source/examples/quick-standalone
        run: |
          export QMapLibre_DIR="$GITHUB_WORKSPACE/install/${{ matrix.build_type }}/maplibre-native-qt"
          cmake -B build -DCMAKE_BUILD_TYPE=${BUILD_TYPE}
          cmake --build build --config ${BUILD_TYPE}

      - name: Build QtWidgets Example
        shell: bash
        working-directory: source/examples/widgets
        run: |
          export QMapLibre_DIR="$GITHUB_WORKSPACE/install/${{ matrix.build_type }}/maplibre-native-qt"
          cmake -B build -DCMAKE_BUILD_TYPE=${BUILD_TYPE}
          cmake --build build --config ${BUILD_TYPE}

      # 🔥 修复 5：上传文件名包含 build_type
      - name: Upload installation
        uses: actions/upload-artifact@v7
        with:
          name: Windows_${{ matrix.arch }}_${{ matrix.qt_version }}_${{ matrix.renderer }}_${{ matrix.build_type }}
          path: source/build/qt6-Windows-${{ matrix.renderer }}/maplibre-native-qt_*.tar.bz2

  release:
    name: Release
    if: github.ref_type == 'tag'
    runs-on: windows-2022
    needs: build-and-test
    permissions:
      contents: write
    strategy:
      matrix:
        qt_version: [6.8.3]
        arch: [msvc2022_64]
        renderer: [OpenGL]
        build_type: [Release, Debug]

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: Windows_${{ matrix.arch }}_${{ matrix.qt_version }}_${{ matrix.renderer }}_${{ matrix.build_type }}

      - name: Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: maplibre-native-qt_${{ github.ref_name }}_Qt${{ matrix.qt_version }}_Windows_${{ matrix.renderer }}_${{ matrix.build_type }}.tar.bz2
          allowUpdates: true
          draft: true
